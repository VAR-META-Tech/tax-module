services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-taxmodule}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_NAME:-tax_module}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taxmodule} -d ${DB_NAME:-tax_module}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.18.3
    volumes:
      - ./internal/repository/postgres/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${DB_USER:-taxmodule}:${DB_PASSWORD:-secret}@postgres:5432/${DB_NAME:-tax_module}?sslmode=disable",
        "up"
      ]

  app:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
